version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      express-packages:
        patterns:
          - "express*"
      testing-tools:
        patterns:
          - "vitest*"
          - "@vitest*"
      typescript-tools:
        patterns:
          - "typescript*"
          - "@typescript-eslint*"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      radix-packages:
        patterns:
          - "@radix-ui*"
      react-packages:
        patterns:
          - "react*"
          - "react-dom*"
          - "@types/react*"
      testing-tools:
        patterns:
          - "vitest*"
          - "@vitest*"
          - "@testing-library*"
      vite-packages:
        patterns:
          - "vite*"
          - "@vitejs*"
